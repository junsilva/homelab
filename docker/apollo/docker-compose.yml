networks:
  servarrnetwork:
    name: servarrnetwork
    ipam:
      config:
        - subnet: 172.39.0.0/24

services:
  ########################
  # VPN + Downloaders
  ########################
  gluetun:
    image: qmcgaw/gluetun
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    networks:
      servarrnetwork:
        ipv4_address: 172.39.0.2
    ports:
      - ${QBITTORRENT_PORT}:${QBITTORRENT_PORT}   # qBittorrent WebUI
      - ${NZBGET_PORT}:${NZBGET_PORT}              # NZBGet
      - ${PROWLARR_PORT}:${PROWLARR_PORT}          # Prowlarr
      - ${FLARESOLVERR_PORT}:${FLARESOLVERR_PORT} # Flaresolverr
    volumes:
      - /srv/appdata/gluetun:/gluetun
    env_file:
      - .env
    healthcheck:
      test: ping -c 1 www.google.com || exit 1
      interval: 20s
      timeout: 10s
      retries: 5
    environment:
      #- BLOCK_MALICIOUS=on
      # Auto-update qBittorrent’s listen port whenever Gluetun forwards one
      - VPN_PORT_FORWARDING_UP_COMMAND=/bin/sh -c 'wget -O- --retry-connrefused --post-data "json={\"listen_port\":{{PORTS}}}" http://127.0.0.1:8080/api/v2/app/setPreferences 2>&1'
      - DNS_UPSTREAM_RESOLVER_TYPE=plain
      - DNS_UPSTREAM_PLAIN_ADDRESSES=1.1.1.1:53,8.8.8.8:53
      - BORINGPOLL_GLUETUNCOM=on
    restart: unless-stopped

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:4.6.7
    container_name: qbittorrent
    depends_on:
      gluetun:
        condition: service_healthy
    network_mode: service:gluetun
    environment:
      - PUID=${PUID_ARR}
      - PGID=${PGID_ARR}
      - TZ=${TZ}
      - WEBUI_PORT=${QBITTORRENT_PORT}
    volumes:
      - /srv/appdata/qbittorrent:/config
      - /mnt/nas:/data
    restart: unless-stopped

  nzbget:
    image: lscr.io/linuxserver/nzbget:latest
    container_name: nzbget
    depends_on:
      gluetun:
        condition: service_healthy
    network_mode: service:gluetun
    environment:
      - PUID=${PUID_ARR}
      - PGID=${PGID_ARR}
      - TZ=${TZ}
    volumes:
      - /srv/appdata/nzbget:/config
      - /mnt/nas:/data
    restart: unless-stopped

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    depends_on:
      gluetun:
        condition: service_healthy
    network_mode: service:gluetun
    environment:
      - PUID=${PUID_ARR}
      - PGID=${PGID_ARR}
      - TZ=${TZ}
    volumes:
      - /srv/appdata/prowlarr:/config
    restart: unless-stopped

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    depends_on:
      gluetun:
        condition: service_healthy
    network_mode: service:gluetun
    environment:
      - LOG_LEVEL=info
      - TZ=${TZ}
    restart: unless-stopped

  ########################
  # Arr Stack (LAN access)
  ########################
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    networks:
      servarrnetwork:
        ipv4_address: 172.39.0.3
    ports:
      - ${SONARR_PORT}:${SONARR_PORT}
    environment:
      - PUID=${PUID_ARR}
      - PGID=${PGID_ARR}
      - TZ=${TZ}
    volumes:
      - /srv/appdata/sonarr:/config
      - /mnt/nas:/data
    restart: unless-stopped

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    networks:
      servarrnetwork:
        ipv4_address: 172.39.0.4
    ports:
      - ${RADARR_PORT}:${RADARR_PORT}
    environment:
      - PUID=${PUID_ARR}
      - PGID=${PGID_ARR}
      - TZ=${TZ}
    volumes:
      - /srv/appdata/radarr:/config
      - /mnt/nas:/data
    restart: unless-stopped

  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    networks:
      servarrnetwork:
        ipv4_address: 172.39.0.5
    ports:
      - ${LIDARR_PORT}:${LIDARR_PORT}
    environment:
      - PUID=${PUID_ARR}
      - PGID=${PGID_ARR}
      - TZ=${TZ}
    volumes:
      - /srv/appdata/lidarr:/config
      - /mnt/nas:/data
    restart: unless-stopped

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    networks:
      servarrnetwork:
        ipv4_address: 172.39.0.6
    ports:
      - ${BAZARR_PORT}:${BAZARR_PORT}
    environment:
      - PUID=${PUID_ARR}
      - PGID=${PGID_ARR}
      - TZ=${TZ}
    volumes:
      - /srv/appdata/bazarr:/config
      - /mnt/nas:/data
    restart: unless-stopped

  mylar:
    image: lscr.io/linuxserver/mylar3:latest
    container_name: mylar
    networks:
      servarrnetwork:
        ipv4_address: 172.39.0.10
    ports:
      - ${MYLAR_PORT}:${MYLAR_PORT}
    environment:
      - PUID=${PUID_ARR}
      - PGID=${PGID_ARR}
      - TZ=${TZ}
    volumes:
      - /srv/appdata/mylar:/config
      - /mnt/nas:/data
    restart: unless-stopped

  sonarr-anime:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr-anime
    networks:
      servarrnetwork:
        ipv4_address: 172.39.0.12  # Keeping your static IP pattern
    ports:
      - ${SONARR_ANIME_PORT}:8989
    environment:
      - PUID=${PUID_ARR}
      - PGID=${PGID_ARR}
      - TZ=${TZ}
    volumes:
      - /srv/appdata/sonarr-anime:/config
      - /mnt/nas:/data
    restart: unless-stopped

  ########################
  # Ebook / Audiobook Management
  ########################
  lazylibrarian:
    image: lscr.io/linuxserver/lazylibrarian:latest
    container_name: lazylibrarian
    networks:
      servarrnetwork:
        ipv4_address: 172.39.0.11
    ports:
      - ${LAZYLIBRARIAN_PORT}:${LAZYLIBRARIAN_PORT}
    environment:
      - PUID=${PUID_ARR}
      - PGID=${PGID_ARR}
      - TZ=${TZ}
    volumes:
      - /srv/appdata/lazylibrarian:/config
      - /mnt/nas:/data
    restart: unless-stopped

  ########################
  # User-facing apps
  ########################
  jellyseerr:
    container_name: jellyseerr
    image: fallenbagel/jellyseerr:latest
    networks:
      servarrnetwork:
        ipv4_address: 172.39.0.7
    ports:
      - ${JELLYSEERR_PORT}:${JELLYSEERR_PORT}
    environment:
      - PUID=${PUID_ARR}
      - PGID=${PGID_ARR}
      - TZ=${TZ}
    volumes:
      - /srv/appdata/jellyseerr:/app/config
    restart: unless-stopped